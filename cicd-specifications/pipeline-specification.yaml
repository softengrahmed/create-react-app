apiVersion: v1
kind: PipelineSpecification
metadata:
  name: create-react-app-cicd-pipeline
  version: v1-2025-09-23
  description: Complete CI/CD pipeline for Create React App Lerna monorepo
  repository: https://github.com/softengrahmed/create-react-app
  created: "2025-09-23T00:00:00Z"
  
spec:
  # Project Configuration
  project:
    name: create-react-app
    type: lerna-monorepo
    language: javascript
    packageManager: npm
    nodeVersion: "18"
    workspaces:
      - packages/*
      - docusaurus/website
    
  # Infrastructure Configuration
  infrastructure:
    provider: aws
    tier: minimal
    estimatedCost: "$8-12/month"
    deployment:
      strategy: blue-green
      platform: serverless
      regions:
        - us-east-1
    
    services:
      compute:
        - type: lambda
          memory: 256MB
          runtime: nodejs18.x
        - type: github-actions
          runner: ubuntu-latest
      
      storage:
        - type: s3
          purpose: documentation-hosting
          retentionDays: 7
        - type: s3
          purpose: artifact-storage
          retentionDays: 7
      
      database:
        - type: aurora-serverless
          acu: "0.5-1"
          purpose: application-data
      
      monitoring:
        - type: cloudwatch
          level: basic
          retentionDays: 7

  # Pipeline Configuration
  pipeline:
    triggers:
      - push:
          branches: [main, develop]
      - pull_request:
          branches: [main]
      - workflow_dispatch
    
    permissions:
      contents: read
      actions: write
      checks: write
      pull-requests: write
      id-token: write
      security-events: write
    
    retryStrategy:
      maxAttempts: 3
      backoffStrategy: exponential
      initialDelay: 30s
    
    artifactRetention: 7

  # Stages Configuration
  stages:
    - name: initialization
      description: Pipeline setup and configuration
      timeout: 5m
      dependencies: []
      outputs:
        - pipeline-id
        - build-matrix
        - should-deploy
        - environment
    
    - name: build
      description: Build all Lerna packages
      timeout: 15m
      dependencies: [initialization]
      strategy:
        type: matrix
        matrix:
          package:
            - create-react-app
            - react-scripts
            - babel-preset-react-app
            - react-dev-utils
            - react-error-overlay
      artifacts:
        - pattern: "packages/*/lib/"
        - pattern: "packages/*/build/"
        - pattern: "packages/*/dist/"
    
    - name: security
      description: Security scanning and vulnerability assessment
      timeout: 10m
      dependencies: [initialization, build]
      tools:
        - npm-audit
        - audit-ci
      artifacts:
        - security-report.json
        - audit-results.json
    
    - name: quality
      description: Code quality gates and testing
      timeout: 20m
      dependencies: [initialization, build]
      tools:
        - eslint
        - prettier
        - jest
      gates:
        - name: lint-check
          command: npm run eslint
        - name: format-check
          command: npm run prettier -- --check
        - name: integration-tests
          command: npm run test:integration
      artifacts:
        - coverage/
        - test-results.xml
    
    - name: deploy
      description: Deploy to target environment
      timeout: 10m
      dependencies: [initialization, build, security, quality]
      condition: needs.initialization.outputs.should-deploy == 'true'
      environment: 
        name: ${{ needs.initialization.outputs.environment }}
      steps:
        - configure-aws-credentials
        - deploy-documentation
        - blue-green-deployment
    
    - name: verify
      description: Post-deployment verification
      timeout: 5m
      dependencies: [initialization, deploy]
      condition: needs.initialization.outputs.should-deploy == 'true'
      checks:
        - health-check
        - performance-metrics
        - endpoint-validation
    
    - name: cleanup
      description: Resource cleanup and maintenance
      timeout: 5m
      dependencies: [verify]
      condition: always()
      operations:
        - clean-build-caches
        - remove-temporary-files
        - cleanup-artifacts
    
    - name: report
      description: Generate pipeline execution report
      timeout: 5m
      dependencies: [cleanup]
      condition: always()
      artifacts:
        - pipeline-report.json

  # Features Configuration
  features:
    securityScanning:
      enabled: true
      tools:
        - npm-audit
        - dependency-check
      severity: high
    
    qualityGates:
      enabled: true
      coverage:
        threshold: 80
      linting:
        enabled: true
        config: .eslintrc.json
      formatting:
        enabled: true
        config: .prettierrc
    
    blueGreenDeployment:
      enabled: true
      strategy: traffic-switch
      verification: health-check
      rollbackOnFailure: true
    
    cleanup:
      strategy: basic
      operations:
        - clean-lambda-functions
        - remove-s3-artifacts
        - clear-build-caches
      retention:
        dev: 7 days
        prod: 30 days

  # Environment Configuration
  environments:
    dev:
      name: development
      branch: develop
      autoDeployment: true
      approvals: []
      variables:
        NODE_ENV: development
        DEBUG: true
    
    prod:
      name: production
      branch: main
      autoDeployment: false
      approvals:
        - required: true
          reviewers: ["@devops-team"]
      variables:
        NODE_ENV: production
        DEBUG: false

  # Compliance Configuration
  compliance:
    level: basic
    logging:
      structured: true
      format: json
      retention: 7 days
    auditing:
      enabled: true
      events:
        - pipeline-start
        - pipeline-end
        - deployment
        - security-scan
    monitoring:
      level: basic
      metrics:
        - build-duration
        - deployment-frequency
        - failure-rate

  # Cost Configuration
  cost:
    tier: minimal
    estimate:
      monthly: "$8-12"
      breakdown:
        compute: "$3-5"
        storage: "$2-3"
        database: "$2-4"
        monitoring: "$1"
    optimization:
      - artifact-cleanup
      - resource-tagging
      - auto-scaling
      - cost-monitoring